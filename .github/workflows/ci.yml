name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  regression-gate:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: AI Regression Gate
        env:
          REGRESSION_GATE_URL: ${{ secrets.REGRESSION_GATE_URL }}
          REGRESSION_GATE_API_KEY: ${{ secrets.REGRESSION_GATE_API_KEY }}
          REGRESSION_GATE_ORG_ID: ${{ secrets.REGRESSION_GATE_ORG_ID }}
          F1_DROP_THRESHOLD: "0.05"
          MIN_F1: "0.7"
        run: bash scripts/regression-gate.sh
